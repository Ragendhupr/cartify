<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
    <style>
  
@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');

        *{
        margin: 0;
    }
    body{
        background :linear-gradient(to bottom, #C4E2EA,white, #C4E2EA);
        font-family: "Nunito", sans-serif;
    }
    .logo{
        color: black;
        transition: 0.3s;
    }
    .logo:hover{
    transform: scale(1.2);
    }
      .nav_items{
        padding: 10px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgb(223, 238, 243);
        height: 70px;
      }
      .nav_items ul{
        display: flex;
        gap: 30px;
        justify-content: space-between;
      }
      .nav_items ul li{
        list-style-type: none;
      }
      .nav_items ul li a{
        text-decoration: none;
        color: black;
      }
      .nav_items ul li a:hover{
        color: #C4E2EA;
      }
.moreBtn{
    border: none;
    font-weight: bold;
    color: black;
    background: none;
    cursor: pointer;
}
      .nav_icon{
        display: none;
        background-color:rgb(223, 238, 243);
        border: none;
        color: black;
        font-weight: bold;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: minmax(10rem, auto);
        gap: 10px;
        padding: 20px;
      }
      .container div {
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        border-radius: 8px;
        padding: 40px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background: linear-gradient(to bottom, #4F7F86, white,#4F7F86);
        border: 1px solid rgba(0, 0, 0, 0.05);
 }
.container div:hover {
transform: translateY(-8px);
box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
}
.footer {
  background: white;
  color: black;
  padding: 50px 20px;
}
.footer p{
    padding: 5px;
}
.footer_title h1:hover{
color: #4F7F86;
transition: 0.3s;
transform: scale(0.8);
}
.company_info ul{
  padding: 10px;
}
.company_info ul li {
    list-style-type:none;
}
.company_info ul li a{
  text-decoration: none;
  color: black;
  line-height: 1.5;
}
.company_info ul li a:hover{
color: #2e6a74;
text-decoration: underline;
}

.footer_container{
    display: flex;
    justify-content: space-between;
    gap: 10px;
}
.footer_icons {
  justify-content:space-between;
  margin-bottom: 10px;
}
.footer_icons i {
  font-size: 18px;
   padding: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.footer_icons i:hover {
  color: #4F7F86;
  transform: scale(1.2);
}
.footer_bottom {
  text-align: center;
  font-size: 14px;
  color:black;
  background-color: white;
  padding-top: 20px;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

.container div {
  animation: fadeIn 3s ease;
}
@media (max-width:990px) {
.container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }
      
.container div {
font-size: 25px;
}
.nav_items{
  position: relative; 
}
.nav_items ul{
  position: absolute;
  z-index: 1000;
  top: 70px;
  display: none;
  flex-direction: column;
  left: 50%;
  transform: translateX(-50%);
  align-items: center;
  background-color:rgb(223, 238, 243) ;
  width: 100%;
}
.nav_icon{
  display: block;
}
  .nav_items ul.show {
    display: flex;
  }

  .nav_items ul li {
    margin: 10px 0;
  }
  .footer_container{
  display: flex;
  flex-direction: column;
}
}


    </style>
  </head>
  <body>
    <nav class="nav_items">
    <div class="logo">
        <h1>Cartify</h1>
    </div>
    <div class="menu_items" id="menu">
    <ul>
        <li><a href="">HOME</a></li>
        <li><a href="">CATEGORIES</a></li>
        <li><a href="">CONTACT</a></li>
        <li><a href="">CART</a></li>
    </ul>
    </div>
    <button class="nav_icon" id="menubtn">☰</button>
    </nav>
    <div class="container"></div>
    <footer class="footer">
  <div class="footer_container">

    <div class="footer_title">
      <h1><b>Cartify</b></h1>
      <p>Your one-stop shop for everything.</p>
    </div>
    <div class="company_info">
        <h2>Company Info</h2>
        <ul>

        <li><a href="">ABOUT US</a></li>
        <li><a href="">CONTACT US</a></li>
        <li><a href="">HELP</a></li>  
        </ul>
    </div>
    <div class="footer_icons">
    <h3>Follow Us</h3>
    <i class="fab fa-facebook-f"></i>
    <i class="fab fa-instagram"></i>
    <i class="fab fa-whatsapp"></i>
  </div>
</div>

<div class="footer_bottom">
    <p>© 2026 Cartify. All rights reserved.</p>
</div>
    <script>
      let getProducts = () => {
        let products = fetch("https://dummyjson.com/products")
          .then((response) => {
            if (!response.ok) {
              console.log("errorFound");
            }
            return response.json();
          })
          .then((data) => data.products)
          .catch((err) => console.log(err));
        //console.log(products);
        return products;
      };
      (async () => {
        let result = await getProducts();
        //console.log(result)
        let grid = document.querySelector(".container");
        result.map((data) => {
          console.log(data);
          let card = document.createElement("div");
          card.innerHTML = `<img src= ${data.images[0]} width="100%">
          <p><b>${data.title}</b></p>
          <p class="desc_short">${data.description.slice(0,60)}...</p>
          <p class="desc_full" style="display:none;">${data.description}</p>
          <button class="moreBtn">More</button>
          
          <p>₹${data.price}</p>
       
        `;
        grid.appendChild(card);
        let btn = card.querySelector(".moreBtn");
let shortText = card.querySelector(".desc_short");
let fullText = card.querySelector(".desc_full");

btn.addEventListener("click", () => {
  if (fullText.style.display === "none") {
    fullText.style.display = "inline";
    shortText.style.display = "none";
    btn.textContent = "Show Less";
  } else {
    fullText.style.display = "none";
    shortText.style.display = "inline";
    btn.textContent = "More";
  }
});
        });
      })();
let menubtn = document.getElementById("menubtn");
let menuList = document.querySelector(".nav_items ul");

menubtn.onclick = function () {
  menuList.classList.toggle("show");
};

    </script>
  </body>
</html>
